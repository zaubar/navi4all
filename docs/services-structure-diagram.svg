<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .label { font: 600 16px/1.2 "Inter", "SF Pro Text", "Segoe UI", sans-serif; fill: #0F172A; }
      .small { font: 500 14px/1.2 "Inter", "SF Pro Text", "Segoe UI", sans-serif; fill: #0F172A; }
      .muted { fill: #475569; }
      .group-backend { fill: #E0ECFB; stroke: #3685E2; stroke-width: 2; }
      .group-services { fill: #F1F5F9; stroke: #94A3B8; stroke-width: 2; }
      .service { fill: #F8FAFC; stroke: #94A3B8; stroke-width: 2; }
      .line { stroke: #94A3B8; stroke-width: 2; }
      .line-strong { stroke: #475569; stroke-width: 2.5; }
      .icon-stroke { stroke: #0F172A; stroke-width: 2; fill: none; }
      .icon-fill { fill: #0F172A; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>

  <!-- Core backend -->
  <rect x="80" y="128" width="360" height="96" rx="18" class="group-backend"/>
  <text x="260" y="174" text-anchor="middle" class="label">Core Backend</text>
  <text x="260" y="198" text-anchor="middle" class="small muted">Unified APIs</text>
  <rect x="108" y="157" width="30" height="11" rx="2" class="icon-stroke"/>
  <rect x="108" y="175" width="30" height="11" rx="2" class="icon-stroke"/>
  <circle cx="134" cy="162" r="1.7" class="icon-fill"/>
  <circle cx="134" cy="180" r="1.7" class="icon-fill"/>

  <!-- Services group -->
  <rect x="560" y="36" width="560" height="308" rx="18" class="group-services"/>
  <text x="840" y="82" text-anchor="middle" class="label">Services</text>
  <text x="840" y="106" text-anchor="middle" class="small muted">Routing + Geocoding</text>
  <circle cx="588" cy="76" r="5" class="icon-stroke"/>
  <circle cx="610" cy="68" r="5" class="icon-stroke"/>
  <circle cx="610" cy="92" r="5" class="icon-stroke"/>
  <line x1="593" y1="76" x2="605" y2="70" class="icon-stroke"/>
  <line x1="593" y1="76" x2="605" y2="90" class="icon-stroke"/>

  <!-- Service sub-boxes inside services -->
  <rect x="600" y="130" width="480" height="54" rx="14" class="service"/>
  <text x="840" y="163" text-anchor="middle" class="label">OpenTripPlanner</text>

  <rect x="600" y="196" width="480" height="54" rx="14" class="service"/>
  <text x="840" y="229" text-anchor="middle" class="label">Valhalla</text>

  <rect x="600" y="262" width="480" height="54" rx="14" class="service"/>
  <text x="840" y="295" text-anchor="middle" class="label">Pelias</text>

  <!-- Optional hierarchy connector -->
  <line x1="840" y1="116" x2="840" y2="130" class="line"/>

  <!-- Dependency arrow -->
  <line x1="440" y1="176" x2="560" y2="176" class="line-strong" marker-end="url(#arrow)"/>
</svg>