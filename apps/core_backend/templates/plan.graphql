query RoutingPlan(
    $date: String!,
    $time: String!,
    $from: InputCoordinates!,
    $to: InputCoordinates!,
    $wheelchair: Boolean!,
    $numItineraries: Int!,
    $arriveBy: Boolean!,
    $transportModes: [TransportMode!]
    $walkSpeed: Float,
    $walkReluctance: Float,
    $walkSafetyFactor: Float,
    $bikeSpeed: Float,
    $optimize: OptimizeType
) {
    plan(
        date: $date,
        time: $time,
        from: $from,
        to: $to,
        wheelchair: $wheelchair,
        numItineraries: $numItineraries,
        arriveBy: $arriveBy,
        transportModes: $transportModes
        walkSpeed: $walkSpeed,
        walkReluctance: $walkReluctance,
        walkSafetyFactor: $walkSafetyFactor,
        bikeSpeed: $bikeSpeed,
        optimize: $optimize
    ) {
        date
        from {
            lat
            lon
        }
        to {
            lat
            lon
        }
        itineraries {
            startTime
            endTime
            duration
            legs {
                startTime
                endTime
                mode
                duration
                legGeometry {
                    length
                    points
                }
                distance
                transitLeg
                from {
                    name
                    vertexType
                    lat
                    lon
                    arrivalTime
                    departureTime
                    stop {
                        id
                        name
                        lat
                        lon
                    }
                }
                to {
                    name
                    vertexType
                    lat
                    lon
                    arrivalTime
                    departureTime
                    stop {
                        id
                        name
                        lat
                        lon
                    }
                }
                route {
                    id
                    shortName
                    mode
                }
                trip {
                    id
                    route {
                        id
                        shortName
                        mode
                    }
                    tripShortName
                    tripHeadsign
                    stops {
                        id
                        name
                        lat
                        lon
                    }
                }
                intermediateStops {
                    id
                    name
                    lat
                    lon
                }
                headsign
                steps {
                    distance
                    lon
                    lat
                    relativeDirection
                    absoluteDirection
                    streetName
                    bogusName
                }
            }
            accessibilityScore
        }
    }
}